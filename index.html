    ymaps.ready(init);

    function init() {
        const map = new ymaps.Map('map', {
            center: [39.654188, 66.959279],
            zoom: 13,
            controls: ['zoomControl', 'fullscreenControl']
        });

        const bounds = [];

        points.forEach(point => {
            let color = '#2ecc71';

            if (point.icon === 'dot_red') {
                color = '#ff0000';
            }

            if (point.icon === 'dot_black') {
                color = '#000000';
            }

            const placemark = new ymaps.Placemark(
                [point.lat, point.lon],
                {
                    balloonContent: `
                        <strong>${point.label}</strong><br>
                        <a
                            href="https://archalert.net/objects/getObject/${point.id}"
                            target="_blank"
                            rel="noopener noreferrer"
                        >
                            ID: ${point.id}
                        </a>
                    `,
                    hintContent: point.label
                },
                {
                    preset: 'islands#circleDotIcon',
                    iconColor: color
                }
            );

            map.geoObjects.add(placemark);
            bounds.push([point.lat, point.lon]);
        });

        map.setBounds(bounds, {
            checkZoomRange: true,
            zoomMargin: 40
        });
    }
